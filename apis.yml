aid: kotlin
name: Kotlin
description: >-
  Kotlin is a modern, concise, and safe programming language for the JVM,
  Android, and multiplatform development. It is developed by JetBrains and
  provides full interoperability with Java. Kotlin's standard library and
  ecosystem offer rich APIs for building applications across all platforms.
